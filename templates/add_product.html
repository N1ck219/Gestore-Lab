{% extends 'base.html' %}

{% block content %}
<div style="max-width: 700px; margin: 0 auto; background: var(--card-bg); padding: 2rem; border-radius: 1rem; border: 1px solid var(--border-color);">
    <h2 style="margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">➕ Aggiungi Materia Prima</h2>
    
    <form method="post">
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 1.5rem;">
            <div class="form-group">
                <label for="codice">
                    Codice Interno *
                    <span class="tooltip-wrapper" tabindex="0">
                        <span class="tooltip-trigger">🛈</span>
                        <span class="tooltip-text">
                            <strong>Codice Interno</strong><br>
                            Il codice identificativo numerico univoco della materia prima.<br>
                            <span class="tooltip-constraint">⚠️ <strong>Vincolo:</strong> Deve essere un numero intero non duplicato nel sistema.</span>
                        </span>
                    </span>
                </label>
                <input type="text" name="codice" id="codice" placeholder="Es. 424" required 
                       value="{{ form_data.codice if form_data else '' }}">
            </div>
            
            <div class="form-group">
                <label for="nome_mp">Nome Materia Prima *</label>
                <input type="text" name="nome_mp" id="nome_mp" placeholder="Es. Acqua arricchita" required
                       value="{{ form_data.nome_mp if form_data else '' }}">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label for="nome_file">Nome File *</label>
                <input type="text" name="nome_file" id="nome_file" placeholder="Es. AcquaArricchita" required
                       value="{{ form_data.nome_file if form_data else '' }}">
            </div>
            
            <div class="form-group">
                <label for="nome_etichetta">Nome per Etichette *</label>
                <input type="text" name="nome_etichetta" id="nome_etichetta" placeholder="Nome sulle etichette" required
                       value="{{ form_data.nome_etichetta if form_data else '' }}">
            </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label for="unita_misura">Unità di Misura *</label>
                <input type="text" name="unita_misura" id="unita_misura" placeholder="Es. g, ml, Pz" required
                       value="{{ form_data.unita_misura if form_data else '' }}">
            </div>
            
            <div class="form-group">
                <label for="codice_fornitore">Codice Fornitore (Opzionale)</label>
                <input type="text" name="codice_fornitore" id="codice_fornitore" placeholder="Es. ABC-123"
                       value="{{ form_data.codice_fornitore if form_data else '' }}">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label for="uso">Destinazione d'uso *</label>
                <input type="text" name="uso" id="uso" placeholder="Es. Produzione / Analisi" required
                       value="{{ form_data.uso if form_data else '' }}">
            </div>

            <div class="form-group">
                <label for="scorta_minima">
                    Quantità Minima (Opzionale)
                    <span class="tooltip-wrapper" tabindex="0">
                        <span class="tooltip-trigger">🛈</span>
                        <span class="tooltip-text">
                            <strong>Quantità Minima (Scorta Minima)</strong><br>
                            Soglia di allerta sotto la quale la materia prima è considerata sottoscorta.<br>
                            <span class="tooltip-constraint">⚠️ <strong>Vincolo:</strong> Deve essere un valore numerico positivo.</span>
                        </span>
                    </span>
                </label>
                <input type="number" step="0.01" name="scorta_minima" id="scorta_minima" placeholder="Es. 10.5"
                       value="{{ form_data.scorta_minima if form_data else '' }}">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; background: var(--bg-dark); border: 1px solid var(--border-color); padding: 1.25rem; border-radius: 0.75rem; margin-bottom: 1.5rem;">
            <div class="form-group" style="margin-bottom: 0;">
                <label for="controcampione">
                    Controcampione *
                    <span class="tooltip-wrapper" tabindex="0">
                        <span class="tooltip-trigger">🛈</span>
                        <span class="tooltip-text">
                            <strong>Richiede Controcampione</strong><br>
                            Determina se i lotti di questa materia prima richiedono la conservazione di un campione di stabilità/archivio.<br>
                            <span class="tooltip-constraint">⚠️ <strong>Vincolo:</strong> Se impostato su SI, il sistema ne richiederà il tracciamento all'arrivo dei lotti.</span>
                        </span>
                    </span>
                </label>
                <select name="controcampione" id="controcampione" required>
                    <option value="NO" {% if form_data and form_data.controcampione == 'NO' %}selected{% endif %}>NO</option>
                    <option value="SI" {% if form_data and form_data.controcampione == 'SI' %}selected{% endif %}>SI</option>
                </select>
            </div>
            
            <div class="form-group" style="margin-bottom: 0;">
                <label for="distribuzione">
                    Distribuzione *
                    <span class="tooltip-wrapper" tabindex="0">
                        <span class="tooltip-trigger">🛈</span>
                        <span class="tooltip-text">
                            <strong>Richiede Scheda Distribuzione</strong><br>
                            Determina se per questa materia prima deve essere stampata la scheda di distribuzione per tracciare i consumi per reparto.<br>
                            <span class="tooltip-constraint">⚠️ <strong>Vincolo:</strong> Obbligatorio. Abilita la generazione PDF della scheda distribuzione.</span>
                        </span>
                    </span>
                </label>
                <select name="distribuzione" id="distribuzione" required>
                    <option value="NO" {% if form_data and form_data.distribuzione == 'NO' %}selected{% endif %}>NO</option>
                    <option value="SI" {% if form_data and form_data.distribuzione == 'SI' %}selected{% endif %}>SI</option>
                </select>
            </div>
        </div>
        
        <p style="color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 1rem;">* Campi obbligatori</p>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">Salva Prodotto</button>
            <a href="{{ url_for('index') }}" class="btn" style="background: rgba(255,255,255,0.05); color: white;">Annulla</a>
        </div>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const codiceInput = document.getElementById("codice");
        const codiceFornitoreInput = document.getElementById("codice_fornitore");
        
        if (codiceInput) {
            codiceInput.addEventListener("input", function() {
                this.value = this.value.toUpperCase();
            });
        }
        if (codiceFornitoreInput) {
            codiceFornitoreInput.addEventListener("input", function() {
                this.value = this.value.toUpperCase();
            });
        }
    });
</script>
{% endblock %}
